<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buchclub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ALLES ORIGINAL + kleine Ergänzungen */

:root {
    --bg: #0D0B14;
    --bg2: #13101F;
    --bg3: #1A1629;
    --bg4: #221E35;
    --primary: #BD00FF;
    --cyan: #00F0FF;
    --pink: #FF007A;
    --text: #E8E4F0;
    --muted: #7A7290;
    --border: rgba(189, 0, 255, 0.18);
    --border2: rgba(0, 240, 255, 0.15);
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    margin:0;
}

/* Stats Page */
#stats-page {
    display:none;
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

.chart-box {
    background: var(--bg2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
    margin-bottom:30px;
}

.chart-title {
    font-family:'Space Mono';
    margin-bottom:10px;
    color:var(--cyan);
}

.nav-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
}

</style>
</head>
<body>

<nav style="display:flex;justify-content:space-between;padding:10px 20px;background:#111;">
    <div>DER BUCH CLUB</div>
    <div>
        <button class="nav-btn" onclick="showMain()">Bücher</button>
        <button class="nav-btn" onclick="showStats()">Stats</button>
    </div>
</nav>

<!-- MAIN PAGE -->
<div id="main-page">
    <div id="loading" style="padding:40px;text-align:center;">Lade Daten...</div>
    <div id="table-wrap"></div>
</div>

<!-- STATS PAGE -->
<div id="stats-page">

    <div class="chart-box">
        <div class="chart-title">Durchschnittsbewertung pro Mitglied</div>
        <canvas id="chartMembers"></canvas>
    </div>

    <div class="chart-box">
        <div class="chart-title">Bewertung über Zeit</div>
        <canvas id="chartTime"></canvas>
    </div>

    <div class="chart-box">
        <div class="chart-title">Wer bewertet am nächsten am Durchschnitt</div>
        <canvas id="chartAccuracy"></canvas>
    </div>

    <div class="chart-box">
        <div class="chart-title">Punkteverteilung</div>
        <canvas id="chartHistogram"></canvas>
    </div>

</div>

<script>
let allBooks = [];

/* CSV PARSER (dein Original) */
function parseCSVLine(line) {
    const result = [];
    let cell = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
            if (ch === '"') {
                if (line[i + 1] === '"') { cell += '"'; i++; }
                else { inQuotes = false; }
            } else { cell += ch; }
        } else if (ch === '"') {
            inQuotes = true;
        } else if (ch === ',') {
            result.push(cell.trim()); cell = '';
        } else {
            cell += ch;
        }
    }
    result.push(cell.trim());
    return result;
}

function parseCSVtext(text) {
    return text.split('\n').map(l => parseCSVLine(l));
}

function buildBooks(rows) {
    const books = [];
    for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r || !r[2]) continue;

        const members = [];
        for (let c = 8; c < r.length; c += 2) {
            const name  = r[c];
            const score = parseFloat(r[c + 1]);
            if (name && !isNaN(score)) members.push({ name, score });
        }

        books.push({
            num: parseInt(r[0]),
            title: r[2],
            members: members,
            avg: parseFloat(r[7])
        });
    }
    return books;
}

/* FETCH */
async function fetchCSV() {
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSmVkfS9NOAQ-BV4uA3XJUHW6hOS5LT5cFUr6DsESars2b7tg1SsMCVUHnyzKaEh4qnhXUqDiHXUl30/pub?gid=0&single=true&output=csv';
    const response = await fetch(csvUrl);
    const text = await response.text();
    const raw  = parseCSVtext(text);
    allBooks = buildBooks(raw);
    buildStats();
}

/* ===========================
   STATS BERECHNUNGEN
=========================== */

function buildStats() {

    const members = {};
    const histogram = {};
    const timeLabels = [];
    const timeValues = [];

    allBooks.forEach(book => {
        timeLabels.push(book.num);
        timeValues.push(book.avg);

        book.members.forEach(m => {
            if (!members[m.name]) members[m.name] = [];
            members[m.name].push({score:m.score, avg:book.avg});

            const rounded = Math.round(m.score);
            histogram[rounded] = (histogram[rounded] || 0) + 1;
        });
    });

    // Durchschnitt pro Mitglied
    const memberNames = [];
    const memberAvg = [];
    const memberAccuracy = [];

    for (let name in members) {
        const arr = members[name];
        const avg = arr.reduce((s,a)=>s+a.score,0)/arr.length;
        const diff = arr.reduce((s,a)=>s+Math.abs(a.score-a.avg),0)/arr.length;

        memberNames.push(name);
        memberAvg.push(avg.toFixed(2));
        memberAccuracy.push(diff.toFixed(2));
    }

    /* CHARTS */
    new Chart(chartMembers, {
        type:'bar',
        data:{
            labels:memberNames,
            datasets:[{label:'Ø Bewertung', data:memberAvg}]
        }
    });

    new Chart(chartTime, {
        type:'line',
        data:{
            labels:timeLabels,
            datasets:[{label:'Ø Score', data:timeValues}]
        }
    });

    new Chart(chartAccuracy, {
        type:'bar',
        data:{
            labels:memberNames,
            datasets:[{label:'Abweichung vom Durchschnitt', data:memberAccuracy}]
        }
    });

    new Chart(chartHistogram, {
        type:'bar',
        data:{
            labels:Object.keys(histogram),
            datasets:[{label:'Anzahl Bewertungen', data:Object.values(histogram)}]
        }
    });
}

/* NAVIGATION */
function showStats() {
    document.getElementById("main-page").style.display = "none";
    document.getElementById("stats-page").style.display = "block";
}

function showMain() {
    document.getElementById("main-page").style.display = "block";
    document.getElementById("stats-page").style.display = "none";
}

fetchCSV();
</script>

</body>
</html>
