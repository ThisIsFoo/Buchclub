<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buchclub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0B14;
            --bg2: #13101F;
            --bg3: #1A1629;
            --bg4: #221E35;
            --primary: #BD00FF;
            --cyan: #00F0FF;
            --pink: #FF007A;
            --text: #E8E4F0;
            --muted: #7A7290;
            --border: rgba(189, 0, 255, 0.18);
            --border2: rgba(0, 240, 255, 0.15);
        }

        *, :before, :after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(13, 11, 20, 0.88);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 56px;
        }

        .nav-brand {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            display: flex;
        }

        .nav-brand .word1 {
            color: var(--primary);
        }
        .nav-brand .word2 {
            color: var(--cyan);
        }
        .nav-brand .word3 {
            color: var(--text);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .nav-tag {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .upload-btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid rgba(0, 240, 255, 0.4);
            color: var(--cyan);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .upload-btn:hover {
            background: rgba(0, 240, 255, 0.08);
        }

        .hero {
            position: relative;
            z-index: 1;
            padding: 4rem 2rem 3rem;
            text-align: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(189, 0, 255, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.6rem, 5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .accent-t { color: var(--text); }
        .accent-p { color: var(--primary); }
        .accent-c { color: var(--cyan); }

        .dot { color: var(--primary); }
        .dot-2 { color: var(--cyan); }
        .dot-3 { color: var(--text); }

        .hero-sub {
            margin-top: 1rem;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .stats {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 1px;
            margin: 0 auto 3rem;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            max-width: 700px;
        }

        .stat {
            flex: 1;
            background: var(--bg2);
            padding: 1.2rem 1rem;
            text-align: center;
        }

        .stat-num {
            font-family: 'Space Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--cyan);
            display: block;
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        .sort-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .sort-label {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-right: 0.3rem;
        }

        .sort-btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .sort-btn:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .sort-btn.active {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 240, 255, 0.06);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
            min-width: 20px;
        }

        .book-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .book-table thead tr {
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
        }

        .book-table th {
            padding: 0.75rem 1rem;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
            text-align: left;
        }

        .book-table tbody tr {
            border-bottom: 1px solid rgba(189, 0, 255, 0.07);
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .book-table tbody tr:last-child {
            border-bottom: none;
        }

        .book-table tbody tr:nth-child(odd) {
            background: var(--bg2);
        }

        .book-table tbody tr:nth-child(even) {
            background: var(--bg3);
        }

        .book-table tbody tr:hover {
            background: var(--bg4);
        }

        .book-table td {
            padding: 0.9rem 1rem;
            vertical-align: middle;
        }

        .td-num {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--primary);
            opacity: 0.7;
            white-space: nowrap;
            width: 56px;
        }

        .td-cover {
            width: 44px;
            padding-right: 0 !important;
        }

        .cover-thumb {
            width: 36px;
            height: 50px;
            object-fit: cover;
            border-radius: 3px;
            display: block;
            background: var(--bg4);
            border: 1px solid var(--border);
        }

        .cover-placeholder {
            display: none; /* nur anzeigen, wenn kein Cover */
        }
        .cover-placeholder.shown {
            display: flex;
        }

        .td-cover.has-cover .cover-placeholder {
            display: none;
        }

        .td-title .book-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text);
            display: block;
            line-height: 1.3;
        }

        .td-title .book-author {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 2px;
            display: block;
        }

        .td-rating {
            text-align: right !important;
            white-space: nowrap;
            min-width: 100px;
        }

        .rating-score {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            display: block;
            line-height: 1;
        }

        .rating-unit {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            display: inline-block;
        }

        .rating-score-unit {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            margin-left: 2px;
        }

        .td-bar {
            width: 120px;
            padding-left: 0.5rem !important;
        }

        .rating-bar-bg {
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .rating-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), var(--cyan));
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 580px;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 60px rgba(189, 0, 255, 0.12);
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            background: var(--bg4);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            z-index: 2;
            transition: border-color 0.15s;
        }

        .modal-close:hover {
            border-color: var(--pink);
            color: var(--pink);
        }

        .modal-cover-wrap {
            position: relative;
            height: 200px;
            overflow: hidden;
            border-radius: 16px 16px 0 0;
        }

        .modal-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-cover-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg2) 0%, transparent 60%);
        }

        .modal-cover-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg3), var(--bg4));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .modal-body {
            padding: 1.5rem 1.8rem 2rem;
        }

        .modal-num {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }

        .modal-title {
            font-family: 'Space Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.3rem;
        }

        .modal-author {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
        }

        .modal-avg-row {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            padding: 1rem 1.2rem;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 10px;
        }

        .modal-avg-num {
            font-family: 'Space Mono', monospace;
            font-size: 2.6rem;
            font-weight: 700;
            color: var(--cyan);
            line-height: 1;
        }

        .modal-avg-of {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .modal-avg-unit {
            font-size: 0.8rem;
            color: var(--muted);
            margin-left: auto;
            text-align: right;
        }

        .state-msg {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }

        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--muted);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }
