<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buchclub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0B14;
            --bg2: #13101F;
            --bg3: #1A1629;
            --bg4: #221E35;
            --primary: #BD00FF;
            --cyan: #00F0FF;
            --pink: #FF007A;
            --text: #E8E4F0;
            --muted: #7A7290;
            --border: rgba(189, 0, 255, 0.18);
            --border2: rgba(0, 240, 255, 0.15);
        }

        *, :before, :after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(13, 11, 20, 0.88);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 56px;
        }

        .nav-brand {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            display: flex;
        }

        .nav-brand span {
            color: var(--primary);
        }

        .nav-brand em {
            color: var(--cyan);
            font-style: normal;
        }

        .nav-brand b {
            color: var(--text);
        }

        .nav-brand .dot {
            color: var(--primary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .nav-tag {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .upload-btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid rgba(0, 240, 255, 0.4);
            color: var(--cyan);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .upload-btn:hover {
            background: rgba(0, 240, 255, 0.08);
        }

        .hero {
            position: relative;
            z-index: 1;
            padding: 4rem 2rem 3rem;
            text-align: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(189, 0, 255, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.6rem, 5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .hero h1 .accent-p {
            color: var(--primary);
        }

        .hero h1 .accent-c {
            color: var(--cyan);
        }

        .hero h1 .accent-t {
            color: var(--text);
        }

        .hero h1 .dot {
            color: var(--primary); /* Punkt in Titelzeile */
        }

        .hero h1 .dot-2 {
            color: var(--cyan); /* Punkt in Club-Zeile */
        }

        .hero h1 .dot-3 {
            color: var(--text); /* Punkt in Page-Zeile */
        }

        .hero-sub {
            margin-top: 1rem;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .stats {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 1px;
            margin: 0 auto 3rem;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            max-width: 700px;
        }

        .stat {
            flex: 1;
            background: var(--bg2);
            padding: 1.2rem 1rem;
            text-align: center;
        }

        .stat-num {
            font-family: 'Space Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--cyan);
            display: block;
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        .sort-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .sort-label {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-right: 0.3rem;
        }

        .sort-btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .sort-btn:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .sort-btn.active {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 240, 255, 0.06);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
            min-width: 20px;
        }

        .drop-zone {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto 3rem;
            border: 2px dashed rgba(0, 240, 255, 0.25);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--cyan);
            background: rgba(0, 240, 255, 0.04);
        }

        .drop-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .drop-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        .drop-sub {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .drop-sub em {
            color: var(--cyan);
            font-style: normal;
        }

        .file-input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .debug-box {
            background: var(--bg3);
            border: 1px solid var(--pink);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            color: var(--pink);
            display: none;
        }

        .book-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .book-table thead tr {
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
        }

        .book-table th {
            padding: 0.75rem 1rem;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
            text-align: left;
        }

        .book-table tbody tr {
            border-bottom: 1px solid rgba(189, 0, 255, 0.07);
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .book-table tbody tr:last-child {
            border-bottom: none;
        }

        .book-table tbody tr:nth-child(odd) {
            background: var(--bg2);
        }

        .
